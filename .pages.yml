# Pages CMS configuration — defines the visual editor at app.pagescms.org.
# Docs: https://pagescms.org/docs

# Where uploaded images are stored, and the public URL they're served from.
media:
  input: public/journal-media
  output: /journal-media
  extensions: [jpg, jpeg, png, webp, gif, svg]

content:
  - name: journal
    label: Journal Posts
    type: collection
    path: src/content/journal
    filename: '{fields.title}.md'
    view:
      fields: [title, date, draft]
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: description
        label: SEO description
        type: text
        required: true
        description: The summary Google shows and link previews use. Aim for ~150 characters.

      - name: date
        label: Date
        type: date
        required: true
        options:
          format: yyyy-MM-dd

      - name: cover
        label: Cover image
        type: image
        description: Optional. Shown as the thumbnail and the social-share preview.

      - name: coverAlt
        label: Cover image — alt text
        type: string
        description: Describe the cover image for accessibility and SEO.

      - name: tags
        label: Tags
        type: string
        list: true
        description: e.g. camera review, fujifilm, street photography

      - name: draft
        label: Draft (hide from the live site)
        type: boolean
        default: false

      - name: body
        label: Post
        type: rich-text
